[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Strip the 'durable' directive from netlify-cdn-cache-control on HTML responses.
# @netlify/plugin-nextjs always adds 'durable' for cached pages, causing Netlify to
# store HTML in its Durable Cache (~1-year TTL). After a deploy changes CSS hashes,
# the stale Durable Cache HTML references missing CSS → 404 → text/plain → unstyled page.
# This edge function intercepts responses after the server handler and removes 'durable'
# so HTML is only stored in the Edge CDN (short TTL, purged on deploy), never Durable Cache.
[[edge_functions]]
  path = "/*"
  function = "strip-html-durable"

[[plugins]]
  package = "./plugins/fix-windows-paths"

[[plugins]]
  package = "./plugins/cache-purge"

[[headers]]
  for = "/_next/static/css/*"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/chunks/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/chunks/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-store"
    Netlify-CDN-Cache-Control = "no-store"
    X-Content-Type-Options = "nosniff"

[[redirects]]
  from = "/r/*"
  to = "/api/track/:splat"
  status = 200
